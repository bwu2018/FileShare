options {
    directory "/var/cache/bind";
    listen-on port 53 { any; };
    listen-on-v6 { none; };
    allow-query { any; };
    recursion no;
    dnssec-validation no;
};

# Local-only, fixed test secret -- never used against real infrastructure. Real
# deployments (see deploy/README.md) generate a fresh one via `tsig-keygen`.
key "update-key" {
    algorithm hmac-sha256;
    secret "UwUr4X2a/4uCVRYdC2vkCmdLexGeykFUTCbrMsBFPco=";
};

zone "dnsstore.test" {
    type master;
    file "/etc/bind/zones/dnsstore.test.zone";
    update-policy { grant update-key subdomain chunks.dnsstore.test TXT; };
};
